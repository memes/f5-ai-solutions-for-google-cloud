# Source: body-based-routing/templates/gke.yaml
kind: GCPRoutingExtension
apiVersion: networking.gke.io/v1
metadata:
  name: body-based-router
  namespace: shared-services
  annotations:
    community.f5.com/demo-source: https://github.com/memes/f5-ai-solutions-for-google-cloud
    community.f5.com/email: m.emes@f5.com
    community.f5.com/owner: emes
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: cluster-gw
  extensionChains:
  - name: chain1
    extensions:
    - name: ext1
      authority: myext.com
      timeout: 1s
      supportedEvents:
      - RequestHeaders
      - RequestBody
      - RequestTrailers
      requestBodySendMode: FullDuplexStreamed
      backendRef:
        group: ""
        kind: Service
        name: body-based-router
        port: 9004
