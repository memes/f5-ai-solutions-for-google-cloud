        - name: CAI_MODERATOR_SCANNER_SERVER_URL
          value: http://cai-scanner.f5-ai-scanner.svc.cluster.local/openai/v1
        - name: CAI_WORKFLOWS_VALIDATE_WORKFLOW_URL
          value: "true"
        - name: JAVA_OPTS_APPEND
