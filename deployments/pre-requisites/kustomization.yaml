apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: shared-services
  annotations:
    config.kubernetes.io/local-config: "true"
resources:
  - namespaces.yaml
  - pg-admin.yaml
  # Cloud Deploy/skaffold/helm and CRDs seem to be a bad combination; ensure the KubeAI CRDs are published from manifest
  - https://raw.githubusercontent.com/kubeai-project/kubeai/refs/tags/v0.22.1/manifests/crds/kubeai.org_models.yaml
  # Install inference objectives
  - https://github.com/kubernetes-sigs/gateway-api-inference-extension/raw/v1.4.0/config/crd/bases/inference.networking.x-k8s.io_inferenceobjectives.yaml
